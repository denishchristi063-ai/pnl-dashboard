<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PnL Terminal">
<title>P&L Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0d13;
    --bg-card:#12161f;
    --border:#1e2430;
    --border-soft:#171c26;
    --text:#e9ecf2;
    --text-dim:#6b7280;
    --text-mid:#94a0b3;
    --amber:#e8a33d;
    --amber-dim:rgba(232,163,61,0.13);
    --green:#3ecf8e;
    --red:#f0654e;
    --red-dim:rgba(240,101,78,0.12);
    --sans:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:var(--sans);
    -webkit-font-smoothing:antialiased;
    padding-top:env(safe-area-inset-top);
    padding-bottom:env(safe-area-inset-bottom);
  }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001ms !important; transition-duration:0.001ms !important;}
  }

  body{
    background-image:
      linear-gradient(rgba(232,163,61,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,163,61,0.025) 1px, transparent 1px);
    background-size:28px 28px;
    background-attachment:fixed;
  }

  header{
    position:sticky;top:0;z-index:10;
    background:linear-gradient(180deg, rgba(10,13,19,0.98), rgba(10,13,19,0.88));
    backdrop-filter:blur(14px);
    padding:18px 16px 14px;
    border-bottom:1px solid var(--border);
  }
  .eyebrow{
    font-family:var(--mono);
    font-size:10.5px;letter-spacing:1.8px;color:var(--amber);
    text-transform:uppercase;font-weight:600;
    display:flex;align-items:center;gap:7px;
  }
  .eyebrow .dot{width:6px;height:6px;border-radius:50%;background:var(--red);flex-shrink:0;}
  .eyebrow .dot.live{background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.5;}}
  h1{
    margin:6px 0 0;font-size:22px;font-weight:700;letter-spacing:-0.4px;
    font-family:var(--sans);
  }

  .summary{display:flex;gap:8px;margin-top:16px;}
  .summary-card{
    flex:1;background:var(--bg-card);border:1px solid var(--border);
    border-radius:10px;padding:10px 12px;min-width:0;
  }
  .summary-card .label{
    font-family:var(--mono);font-size:9.5px;color:var(--text-dim);
    text-transform:uppercase;letter-spacing:1px;
  }
  .summary-card .value{
    font-family:var(--mono);font-size:17px;font-weight:600;margin-top:3px;
    font-feature-settings:"tnum";letter-spacing:-0.3px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }

  main{padding:16px 16px 48px;display:flex;flex-direction:column;gap:12px;max-width:720px;margin:0 auto;}

  .acc-card{
    background:var(--bg-card);border:1px solid var(--border);border-radius:14px;
    padding:15px 16px 13px;transition:opacity .3s, border-color .2s;
  }
  .acc-card.offline{opacity:0.4;}
  .acc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .acc-name{font-size:14.5px;font-weight:600;letter-spacing:-0.1px;}
  .acc-meta{
    font-family:var(--mono);font-size:10px;color:var(--text-dim);margin-top:4px;
    display:flex;align-items:center;gap:6px;flex-wrap:wrap;
  }
  .badge{
    display:inline-flex;align-items:center;font-family:var(--mono);font-size:9.5px;
    padding:2px 6px;border-radius:4px;letter-spacing:0.4px;
    background:var(--amber-dim);color:var(--amber);border:1px solid rgba(232,163,61,0.25);
    font-weight:600;
  }
  .badge.stale{background:var(--red-dim);color:var(--red);border-color:rgba(240,101,78,0.3);}

  .acc-pnl{
    font-family:var(--mono);font-size:21px;font-weight:700;text-align:right;
    font-feature-settings:"tnum";letter-spacing:-0.5px;flex-shrink:0;
  }
  .acc-pnl.pos{color:var(--green);}
  .acc-pnl.neg{color:var(--red);}
  .acc-pnl.flat{color:var(--text-mid);}
  .acc-pnl .ccy{font-size:11px;color:var(--text-dim);font-weight:500;margin-left:3px;}

  .sparkline-wrap{margin-top:10px;height:34px;position:relative;}
  .sparkline-wrap svg{width:100%;height:100%;display:block;overflow:visible;}

  .metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:11px;}
  .metrics.secondary{margin-top:8px;}
  .metric .label{
    font-family:var(--mono);font-size:9px;color:var(--text-dim);
    text-transform:uppercase;letter-spacing:0.8px;
  }
  .metric .val{
    font-family:var(--mono);font-size:13px;font-weight:600;margin-top:3px;
    font-feature-settings:"tnum";color:var(--text-mid);
  }
  .metric .val.pos{color:var(--green);}
  .metric .val.neg{color:var(--red);}

  .baskets{margin-top:11px;border-top:1px solid var(--border-soft);padding-top:9px;}
  .baskets-title{
    font-family:var(--mono);font-size:9px;color:var(--text-dim);
    text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;
  }
  .basket-row{
    background:rgba(255,255,255,0.02);border-radius:8px;padding:7px 9px;margin-bottom:5px;
  }
  .basket-top{display:flex;justify-content:space-between;align-items:baseline;}
  .basket-symbol{font-family:var(--mono);font-size:11.5px;font-weight:600;color:var(--text);}
  .basket-legs{font-family:var(--mono);font-size:9.5px;color:var(--text-dim);}
  .basket-net{font-family:var(--mono);font-size:12.5px;font-weight:700;font-feature-settings:"tnum";}
  .basket-net.pos{color:var(--green);}
  .basket-net.neg{color:var(--red);}
  .basket-detail{
    display:flex;gap:10px;margin-top:4px;font-family:var(--mono);font-size:9.5px;color:var(--text-dim);
    flex-wrap:wrap;
  }
  .basket-detail span b{color:var(--text-mid);font-weight:600;}

  .positions{margin-top:11px;border-top:1px solid var(--border-soft);padding-top:8px;}
  .pos-row{padding:5px 0;font-family:var(--mono);font-size:11px;color:var(--text-mid);}
  .pos-row-top{display:flex;justify-content:space-between;}
  .pos-row-top .p-tag{color:var(--text-dim);}
  .pos-row-top .p-pnl{font-feature-settings:"tnum";font-weight:600;}
  .pos-row-top .p-pnl.pos{color:var(--green);}
  .pos-row-top .p-pnl.neg{color:var(--red);}
  .pos-row-detail{
    display:flex;gap:9px;margin-top:2px;font-size:9.5px;color:var(--text-dim);flex-wrap:wrap;
  }
  .pos-row-detail span b{color:var(--text-mid);font-weight:500;}

  .empty{
    text-align:center;color:var(--text-dim);padding:70px 24px;font-size:13.5px;
    font-family:var(--mono);line-height:1.7;
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow"><span class="dot" id="conn-dot"></span><span id="conn-text">CONNECTING</span></div>
  <h1>P&amp;L Terminal</h1>
  <div class="summary">
    <div class="summary-card">
      <div class="label">Accounts</div>
      <div class="value" id="sum-count">0</div>
    </div>
    <div class="summary-card">
      <div class="label">Total Equity</div>
      <div class="value" id="sum-equity">0.00</div>
    </div>
    <div class="summary-card">
      <div class="label">Total Floating</div>
      <div class="value" id="sum-pnl">0.00</div>
    </div>
  </div>
</header>

<main id="cards"></main>

<script>
const STALE_MS = 15000;
const HISTORY_MAX = 40;
let accounts = {};
let history = {};

const cardsEl = document.getElementById('cards');
const dot = document.getElementById('conn-dot');
const connText = document.getElementById('conn-text');

function fmt(n, decimals=2){
  n = Number(n) || 0;
  return n.toLocaleString(undefined,{minimumFractionDigits:decimals, maximumFractionDigits:decimals});
}

function recordHistory(a){
  const id = a.account_id;
  if(!history[id]) history[id] = [];
  const arr = history[id];
  const last = arr[arr.length-1];
  if(!last || last.equity !== a.equity){
    arr.push({t: Date.now(), equity: Number(a.equity)||0});
    if(arr.length > HISTORY_MAX) arr.shift();
  }
}

function sparklineSvg(points){
  if(points.length < 2){
    return `<svg viewBox="0 0 300 34" preserveAspectRatio="none"></svg>`;
  }
  const vals = points.map(p => p.equity);
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = (max - min) || 1;
  const w = 300, h = 30, pad = 2;
  const step = w / (points.length - 1);
  const coords = points.map((p, i) => {
    const x = i * step;
    const y = pad + (h - pad*2) * (1 - (p.equity - min) / range);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  const last = points[points.length-1].equity;
  const first = points[0].equity;
  const color = last >= first ? 'var(--green)' : 'var(--red)';
  const linePoints = coords.join(' ');
  const areaPoints = `0,${h} ${linePoints} ${w},${h}`;
  return `<svg viewBox="0 0 ${w} ${h+4}" preserveAspectRatio="none">
    <polyline points="${areaPoints}" fill="${color}" opacity="0.08" stroke="none"/>
    <polyline points="${linePoints}" fill="none" stroke="${color}" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>
  </svg>`;
}

function render(){
  const ids = Object.keys(accounts).sort();
  if(ids.length === 0){
    cardsEl.innerHTML = '<div class="empty">// AWAITING FEED —<br>no accounts reporting yet.<br>Check EA WebRequest whitelist &amp; API key.</div>';
  } else {
    cardsEl.innerHTML = ids.map(id => renderCard(accounts[id])).join('');
  }

  let totalEquity = 0, totalPnl = 0, count = 0;
  ids.forEach(id => {
    const a = accounts[id];
    totalEquity += Number(a.equity)||0;
    totalPnl += Number(a.floating_pnl)||0;
    count++;
  });
  document.getElementById('sum-count').textContent = count;
  document.getElementById('sum-equity').textContent = fmt(totalEquity);
  const pnlEl = document.getElementById('sum-pnl');
  pnlEl.textContent = fmt(totalPnl);
  pnlEl.style.color = totalPnl > 0 ? 'var(--green)' : (totalPnl < 0 ? 'var(--red)' : 'var(--text)');
}

function fmtDuration(mins){
  mins = Number(mins)||0;
  if(mins < 60) return mins + 'm';
  const h = Math.floor(mins/60), m = mins%60;
  if(h < 24) return h + 'h ' + m + 'm';
  const d = Math.floor(h/24);
  return d + 'd ' + (h%24) + 'h';
}

function renderCard(a){
  const now = Date.now();
  const online = (now - a.last_update*1000) < STALE_MS;
  const pnl = Number(a.floating_pnl)||0;
  const pnlClass = pnl > 0 ? 'pos' : (pnl < 0 ? 'neg' : 'flat');
  const hist = history[a.account_id] || [];
  const dayPnl = Number(a.day_pnl)||0;
  const dd = Number(a.drawdown_pct)||0;

  const positions = (a.positions||[]).map(p => {
    const pc = (Number(p.profit)||0) >= 0 ? 'pos' : 'neg';
    const hasSlTp = (Number(p.sl)||0) > 0 || (Number(p.tp)||0) > 0;
    return `<div class="pos-row">
      <div class="pos-row-top">
        <span class="p-tag">${p.symbol||''} <span style="color:var(--text-mid)">${p.type||''}</span> ${fmt(p.volume,2)}</span>
        <span class="p-pnl ${pc}">${fmt(p.profit)}</span>
      </div>
      <div class="pos-row-detail">
        <span><b>${fmt(p.open_price,5)}</b> → <b>${fmt(p.current_price,5)}</b></span>
        ${hasSlTp ? `<span>SL <b>${Number(p.sl)>0?fmt(p.sl,5):'—'}</b> / TP <b>${Number(p.tp)>0?fmt(p.tp,5):'—'}</b></span>` : ''}
        <span>swap <b>${fmt(p.swap)}</b></span>
        <span>open <b>${fmtDuration(p.duration_min)}</b> ago</span>
      </div>
    </div>`;
  }).join('');

  const baskets = (a.symbols||[]).filter(s => s.leg_count > 0 || Math.abs(s.net_total||0) > 0.005).map(s => {
    const net = Number(s.net_total)||0;
    const netClass = net >= 0 ? 'pos' : 'neg';
    return `<div class="basket-row">
      <div class="basket-top">
        <span class="basket-symbol">${s.symbol}</span>
        <span class="basket-legs">${s.leg_count} leg${s.leg_count===1?'':'s'} · avg ${fmt(s.avg_entry,5)}</span>
        <span class="basket-net ${netClass}">${net>=0?'+':''}${fmt(net)}</span>
      </div>
      <div class="basket-detail">
        <span>profit <b>${fmt((s.open_profit||0)+(s.closed_profit||0))}</b></span>
        <span>swap <b>${fmt((s.open_swap||0)+(s.closed_swap||0))}</b></span>
        <span>commission <b>${fmt(s.closed_commission)}</b></span>
      </div>
    </div>`;
  }).join('');

  return `
  <div class="acc-card ${online ? '' : 'offline'}">
    <div class="acc-top">
      <div>
        <div class="acc-name">${a.label || a.account_id}</div>
        <div class="acc-meta">
          <span class="badge">${a.platform||'-'}</span>
          <span>${a.broker||''}${a.account_id ? ' · #'+a.account_id : ''}</span>
          ${!online ? '<span class="badge stale">STALE</span>' : ''}
        </div>
      </div>
      <div class="acc-pnl ${pnlClass}">${pnl>=0?'+':''}${fmt(pnl)}<span class="ccy">${a.currency||''}</span></div>
    </div>
    <div class="sparkline-wrap">${sparklineSvg(hist)}</div>
    <div class="metrics">
      <div class="metric"><div class="label">Balance</div><div class="val">${fmt(a.balance)}</div></div>
      <div class="metric"><div class="label">Equity</div><div class="val">${fmt(a.equity)}</div></div>
      <div class="metric"><div class="label">Margin Lvl</div><div class="val">${fmt(a.margin_level,1)}%</div></div>
    </div>
    <div class="metrics secondary">
      <div class="metric"><div class="label">Leverage</div><div class="val">1:${fmt(a.leverage,0)}</div></div>
      <div class="metric"><div class="label">Free Margin</div><div class="val">${fmt(a.margin_free)}</div></div>
      <div class="metric"><div class="label">Margin Used</div><div class="val">${fmt(a.margin_used_pct,1)}%</div></div>
      <div class="metric"><div class="label">Day P&amp;L</div><div class="val ${dayPnl>0?'pos':(dayPnl<0?'neg':'')}">${dayPnl>=0?'+':''}${fmt(dayPnl)}</div></div>
      <div class="metric"><div class="label">Drawdown</div><div class="val ${dd>0.01?'neg':''}">${fmt(dd,1)}%</div></div>
    </div>
    ${baskets ? `<div class="baskets"><div class="baskets-title">Per-symbol breakdown</div>${baskets}</div>` : ''}
    ${positions ? `<div class="positions">${positions}</div>` : ''}
  </div>`;
}

setInterval(render, 1000);

function connect(){
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(`${proto}//${location.host}/ws`);

  ws.onopen = () => {
    dot.classList.add('live');
    connText.textContent = 'LIVE FEED';
  };
  ws.onclose = () => {
    dot.classList.remove('live');
    connText.textContent = 'DISCONNECTED — RETRYING';
    setTimeout(connect, 2000);
  };
  ws.onerror = () => ws.close();
  ws.onmessage = (evt) => {
    const msg = JSON.parse(evt.data);
    if(msg.type === 'full_state'){
      accounts = msg.accounts || {};
      Object.values(accounts).forEach(recordHistory);
    } else if(msg.type === 'update'){
      accounts[msg.account.account_id] = msg.account;
      recordHistory(msg.account);
    }
    render();
  };
}

connect();
render();
</script>
</body>
</html>
