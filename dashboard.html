<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PnL Terminal">
<title>P&L Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0d13; --bg-card:#12161f; --border:#1e2430; --border-soft:#171c26;
    --text:#e9ecf2; --text-dim:#6b7280; --text-mid:#94a0b3;
    --amber:#e8a33d; --amber-dim:rgba(232,163,61,0.13);
    --green:#3ecf8e; --red:#f0654e; --red-dim:rgba(240,101,78,0.12);
    --sans:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
    --grid-line:rgba(232,163,61,0.025);
  }
  html[data-theme="light"]{
    --bg:#f7f8fa; --bg-card:#ffffff; --border:#e3e7ee; --border-soft:#edf0f5;
    --text:#12161f; --text-dim:#8891a0; --text-mid:#4b5563;
    --amber:#0f766e; --amber-dim:rgba(15,118,110,0.08);
    --green:#16a34a; --red:#dc2626; --red-dim:rgba(220,38,38,0.08);
    --grid-line:rgba(15,118,110,0.03);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:var(--sans);-webkit-font-smoothing:antialiased;
    padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);
  }
  @media (prefers-reduced-motion: reduce){ *{animation-duration:0.001ms !important; transition-duration:0.001ms !important;} }
  body{
    background-image:linear-gradient(var(--grid-line) 1px, transparent 1px),linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size:28px 28px;background-attachment:fixed;
  }

  header{
    position:sticky;top:0;z-index:10;
    background:linear-gradient(180deg, color-mix(in srgb, var(--bg) 98%, transparent), color-mix(in srgb, var(--bg) 88%, transparent));
    backdrop-filter:blur(14px);padding:18px 16px 14px;border-bottom:1px solid var(--border);
  }
  .header-top{display:flex;justify-content:space-between;align-items:flex-start;}
  .eyebrow{font-family:var(--mono);font-size:10.5px;letter-spacing:1.8px;color:var(--amber);text-transform:uppercase;font-weight:600;display:flex;align-items:center;gap:7px;}
  .eyebrow .dot{width:6px;height:6px;border-radius:50%;background:var(--red);flex-shrink:0;}
  .eyebrow .dot.live{background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.5;}}
  h1{margin:6px 0 0;font-size:22px;font-weight:700;letter-spacing:-0.4px;}

  .icon-btn{
    background:var(--bg-card);border:1px solid var(--border);border-radius:9px;
    width:34px;height:34px;display:flex;align-items:center;justify-content:center;
    cursor:pointer;color:var(--text-mid);font-size:15px;flex-shrink:0;
  }
  .header-actions{display:flex;gap:6px;}

  .summary{display:flex;gap:8px;margin-top:16px;}
  .summary-card{flex:1;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;min-width:0;}
  .summary-card .label{font-family:var(--mono);font-size:9.5px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;}
  .summary-card .value{font-family:var(--mono);font-size:17px;font-weight:600;margin-top:3px;font-feature-settings:"tnum";letter-spacing:-0.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  .toolbar{display:flex;gap:8px;margin-top:12px;}
  .toolbar button{
    flex:1;font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:0.4px;
    padding:8px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);
    color:var(--text-mid);cursor:pointer;text-transform:uppercase;
  }
  .toolbar button.active{color:var(--amber);border-color:var(--amber);background:var(--amber-dim);}

  .chip-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px;}
  .chip{
    font-family:var(--mono);font-size:10.5px;padding:4px 10px;border-radius:20px;
    border:1px solid var(--border);color:var(--text-dim);cursor:pointer;background:var(--bg-card);
  }
  .chip.active{color:var(--amber);border-color:var(--amber);background:var(--amber-dim);font-weight:600;}

  main{padding:16px 16px 48px;display:flex;flex-direction:column;gap:12px;max-width:720px;margin:0 auto;}

  .digest-panel{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;display:none;}
  .digest-panel.open{display:block;}
  .digest-title{font-family:var(--mono);font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
  .digest-title a{color:var(--amber);text-decoration:none;font-weight:600;font-size:10.5px;}
  .digest-row{display:flex;justify-content:space-between;padding:6px 0;border-top:1px solid var(--border-soft);font-family:var(--mono);font-size:12px;}
  .digest-row:first-of-type{border-top:none;}
  .digest-row .sym{font-weight:600;}
  .digest-row .figs{display:flex;gap:12px;color:var(--text-mid);}
  .digest-row .figs b.pos{color:var(--green);}
  .digest-row .figs b.neg{color:var(--red);}
  .digest-empty{color:var(--text-dim);font-family:var(--mono);font-size:11.5px;padding:6px 0;}

  .acc-card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:15px 16px 13px;transition:opacity .3s, border-color .2s;}
  .acc-card.offline{opacity:0.4;}
  .acc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .acc-name{font-size:14.5px;font-weight:600;letter-spacing:-0.1px;}
  .acc-meta{font-family:var(--mono);font-size:10px;color:var(--text-dim);margin-top:4px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .badge{display:inline-flex;align-items:center;font-family:var(--mono);font-size:9.5px;padding:2px 6px;border-radius:4px;letter-spacing:0.4px;background:var(--amber-dim);color:var(--amber);border:1px solid var(--amber);border-color:color-mix(in srgb, var(--amber) 35%, transparent);font-weight:600;}
  .badge.stale{background:var(--red-dim);color:var(--red);border-color:color-mix(in srgb, var(--red) 35%, transparent);}

  .acc-pnl{font-family:var(--mono);font-size:21px;font-weight:700;text-align:right;font-feature-settings:"tnum";letter-spacing:-0.5px;flex-shrink:0;}
  .acc-pnl.pos{color:var(--green);} .acc-pnl.neg{color:var(--red);} .acc-pnl.flat{color:var(--text-mid);}
  .acc-pnl .ccy{font-size:11px;color:var(--text-dim);font-weight:500;margin-left:3px;}

  .sparkline-wrap{margin-top:10px;height:34px;position:relative;}
  .sparkline-wrap svg{width:100%;height:100%;display:block;overflow:visible;}

  .metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:11px;}
  .metrics.secondary{margin-top:8px;}
  .metric .label{font-family:var(--mono);font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.8px;}
  .metric .val{font-family:var(--mono);font-size:13px;font-weight:600;margin-top:3px;font-feature-settings:"tnum";color:var(--text-mid);}
  .metric .val.pos{color:var(--green);} .metric .val.neg{color:var(--red);}

  .baskets{margin-top:11px;border-top:1px solid var(--border-soft);padding-top:9px;}
  .baskets-title{font-family:var(--mono);font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
  .basket-row{background:rgba(128,128,128,0.05);border-radius:8px;padding:7px 9px;margin-bottom:5px;}
  .basket-top{display:flex;justify-content:space-between;align-items:baseline;}
  .basket-symbol{font-family:var(--mono);font-size:11.5px;font-weight:600;}
  .basket-legs{font-family:var(--mono);font-size:9.5px;color:var(--text-dim);}
  .basket-net{font-family:var(--mono);font-size:12.5px;font-weight:700;font-feature-settings:"tnum";}
  .basket-net.pos{color:var(--green);} .basket-net.neg{color:var(--red);}
  .basket-detail{display:flex;gap:10px;margin-top:4px;font-family:var(--mono);font-size:9.5px;color:var(--text-dim);flex-wrap:wrap;}
  .basket-detail span b{color:var(--text-mid);font-weight:600;}

  .positions{margin-top:11px;border-top:1px solid var(--border-soft);padding-top:8px;}
  .pos-row{padding:5px 0;font-family:var(--mono);font-size:11px;color:var(--text-mid);}
  .pos-row-top{display:flex;justify-content:space-between;}
  .pos-row-top .p-tag{color:var(--text-dim);}
  .pos-row-top .p-pnl{font-feature-settings:"tnum";font-weight:600;}
  .pos-row-top .p-pnl.pos{color:var(--green);} .pos-row-top .p-pnl.neg{color:var(--red);}
  .pos-row-detail{display:flex;gap:9px;margin-top:2px;font-size:9.5px;color:var(--text-dim);flex-wrap:wrap;}
  .pos-row-detail span b{color:var(--text-mid);font-weight:500;}

  .empty{text-align:center;color:var(--text-dim);padding:70px 24px;font-size:13.5px;font-family:var(--mono);line-height:1.7;}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div>
      <div class="eyebrow"><span class="dot" id="conn-dot"></span><span id="conn-text">CONNECTING</span></div>
      <h1>P&amp;L Terminal</h1>
    </div>
    <div class="header-actions">
      <div class="icon-btn" id="theme-toggle" title="Toggle theme">◐</div>
      <a class="icon-btn" href="/logout" title="Log out" style="text-decoration:none;">⎋</a>
    </div>
  </div>

  <div class="summary">
    <div class="summary-card"><div class="label">Accounts</div><div class="value" id="sum-count">0</div></div>
    <div class="summary-card"><div class="label">Total Equity</div><div class="value" id="sum-equity">0.00</div></div>
    <div class="summary-card"><div class="label">Total Floating</div><div class="value" id="sum-pnl">0.00</div></div>
  </div>

  <div class="toolbar">
    <button id="btn-digest">Daily Digest</button>
    <button id="btn-csv">Export CSV</button>
  </div>

  <div class="chip-row" id="symbol-chips"></div>
</header>

<main>
  <div class="digest-panel" id="digest-panel">
    <div class="digest-title"><span id="digest-date-label">TODAY'S DIGEST</span><a href="#" id="digest-csv-link">Export this day →</a></div>
    <div id="digest-body"><div class="digest-empty">Loading…</div></div>
  </div>
  <div id="cards"></div>
</main>

<script>
const STALE_MS = 15000;
const HISTORY_MAX = 60;
let accounts = {};
let history = {};
let seededAccounts = new Set();
let selectedSymbols = new Set();
let digestOpen = false;

const cardsEl = document.getElementById('cards');
const dot = document.getElementById('conn-dot');
const connText = document.getElementById('conn-text');

// ---- theme ----
const THEME_KEY = 'pnl_theme';
function applyTheme(t){ document.documentElement.setAttribute('data-theme', t); localStorage.setItem(THEME_KEY, t); }
applyTheme(localStorage.getItem(THEME_KEY) || 'dark');
document.getElementById('theme-toggle').onclick = () => {
  const cur = document.documentElement.getAttribute('data-theme');
  applyTheme(cur === 'light' ? 'dark' : 'light');
};

function fmt(n, decimals=2){
  n = Number(n) || 0;
  return n.toLocaleString(undefined,{minimumFractionDigits:decimals, maximumFractionDigits:decimals});
}
function fmtDuration(mins){
  mins = Number(mins)||0;
  if(mins < 60) return mins + 'm';
  const h = Math.floor(mins/60), m = mins%60;
  if(h < 24) return h + 'h ' + m + 'm';
  const d = Math.floor(h/24);
  return d + 'd ' + (h%24) + 'h';
}
function todayStr(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

// ---- sparkline history (seeded from server, then live-appended) ----
function recordHistory(a){
  const id = a.account_id;
  if(!history[id]) history[id] = [];
  const arr = history[id];
  const last = arr[arr.length-1];
  if(!last || last.equity !== a.equity){
    arr.push({t: Date.now(), equity: Number(a.equity)||0});
    if(arr.length > HISTORY_MAX) arr.shift();
  }
}
async function seedHistory(accountId){
  if(seededAccounts.has(accountId)) return;
  seededAccounts.add(accountId);
  try{
    const res = await fetch(`/api/history?account_id=${encodeURIComponent(accountId)}&hours=6`);
    if(!res.ok) return;
    const rows = await res.json();
    history[accountId] = rows.map(r => ({t: r.ts*1000, equity: r.equity})).slice(-HISTORY_MAX);
  }catch(e){ /* non-fatal */ }
}

function sparklineSvg(points){
  if(points.length < 2) return `<svg viewBox="0 0 300 34" preserveAspectRatio="none"></svg>`;
  const vals = points.map(p => p.equity);
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = (max - min) || 1;
  const w = 300, h = 30, pad = 2;
  const step = w / (points.length - 1);
  const coords = points.map((p, i) => {
    const x = i * step;
    const y = pad + (h - pad*2) * (1 - (p.equity - min) / range);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  const last = points[points.length-1].equity, first = points[0].equity;
  const colorVar = last >= first ? 'var(--green)' : 'var(--red)';
  const linePoints = coords.join(' ');
  const areaPoints = `0,${h} ${linePoints} ${w},${h}`;
  return `<svg viewBox="0 0 ${w} ${h+4}" preserveAspectRatio="none">
    <polyline points="${areaPoints}" fill="${colorVar}" opacity="0.08" stroke="none"/>
    <polyline points="${linePoints}" fill="none" stroke="${colorVar}" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>
  </svg>`;
}

// ---- symbol filter chips ----
function allSymbols(){
  const set = new Set();
  Object.values(accounts).forEach(a => (a.symbols||[]).forEach(s => { if(s.symbol) set.add(s.symbol); }));
  return Array.from(set).sort();
}
function renderChips(){
  const syms = allSymbols();
  const chipsEl = document.getElementById('symbol-chips');
  if(syms.length === 0){ chipsEl.innerHTML = ''; return; }
  chipsEl.innerHTML = syms.map(s => {
    const active = selectedSymbols.size === 0 || selectedSymbols.has(s);
    return `<div class="chip ${active && selectedSymbols.size>0 ? 'active':''}" data-sym="${s}">${s}</div>`;
  }).join('') + `<div class="chip ${selectedSymbols.size===0?'active':''}" data-sym="__all__">All</div>`;
  chipsEl.querySelectorAll('.chip').forEach(chip => {
    chip.onclick = () => {
      const sym = chip.dataset.sym;
      if(sym === '__all__'){ selectedSymbols.clear(); }
      else if(selectedSymbols.has(sym)){ selectedSymbols.delete(sym); }
      else{ selectedSymbols.add(sym); }
      renderChips();
      render();
      if(digestOpen) loadDigest();
    };
  });
}
function symbolPasses(sym){
  return selectedSymbols.size === 0 || selectedSymbols.has(sym);
}

// ---- main render ----
function render(){
  const ids = Object.keys(accounts).sort();
  if(ids.length === 0){
    cardsEl.innerHTML = '<div class="empty">// AWAITING FEED —<br>no accounts reporting yet.<br>Check EA WebRequest whitelist &amp; API key.</div>';
  } else {
    cardsEl.innerHTML = ids.map(id => renderCard(accounts[id])).join('');
  }
  renderChips();

  let totalEquity = 0, totalPnl = 0, count = 0;
  ids.forEach(id => {
    const a = accounts[id];
    totalEquity += Number(a.equity)||0;
    totalPnl += Number(a.floating_pnl)||0;
    count++;
  });
  document.getElementById('sum-count').textContent = count;
  document.getElementById('sum-equity').textContent = fmt(totalEquity);
  const pnlEl = document.getElementById('sum-pnl');
  pnlEl.textContent = fmt(totalPnl);
  pnlEl.style.color = totalPnl > 0 ? 'var(--green)' : (totalPnl < 0 ? 'var(--red)' : 'var(--text)');
}

function renderCard(a){
  const now = Date.now();
  const online = (now - a.last_update*1000) < STALE_MS;
  const pnl = Number(a.floating_pnl)||0;
  const pnlClass = pnl > 0 ? 'pos' : (pnl < 0 ? 'neg' : 'flat');
  const hist = history[a.account_id] || [];
  const dayPnl = Number(a.day_pnl)||0;
  const dd = Number(a.drawdown_pct)||0;

  const positions = (a.positions||[]).filter(p => symbolPasses(p.symbol)).map(p => {
    const pc = (Number(p.profit)||0) >= 0 ? 'pos' : 'neg';
    const hasSlTp = (Number(p.sl)||0) > 0 || (Number(p.tp)||0) > 0;
    return `<div class="pos-row">
      <div class="pos-row-top">
        <span class="p-tag">${p.symbol||''} <span style="color:var(--text-mid)">${p.type||''}</span> ${fmt(p.volume,2)}</span>
        <span class="p-pnl ${pc}">${fmt(p.profit)}</span>
      </div>
      <div class="pos-row-detail">
        <span><b>${fmt(p.open_price,5)}</b> → <b>${fmt(p.current_price,5)}</b></span>
        ${hasSlTp ? `<span>SL <b>${Number(p.sl)>0?fmt(p.sl,5):'—'}</b> / TP <b>${Number(p.tp)>0?fmt(p.tp,5):'—'}</b></span>` : ''}
        <span>swap <b>${fmt(p.swap)}</b></span>
        <span>open <b>${fmtDuration(p.duration_min)}</b> ago</span>
      </div>
    </div>`;
  }).join('');

  const baskets = (a.symbols||[])
    .filter(s => symbolPasses(s.symbol) && (s.leg_count > 0 || Math.abs(s.net_total||0) > 0.005))
    .map(s => {
      const net = Number(s.net_total)||0;
      const netClass = net >= 0 ? 'pos' : 'neg';
      return `<div class="basket-row">
        <div class="basket-top">
          <span class="basket-symbol">${s.symbol}</span>
          <span class="basket-legs">${s.leg_count} leg${s.leg_count===1?'':'s'} · avg ${fmt(s.avg_entry,5)}</span>
          <span class="basket-net ${netClass}">${net>=0?'+':''}${fmt(net)}</span>
        </div>
        <div class="basket-detail">
          <span>profit <b>${fmt((s.open_profit||0)+(s.closed_profit||0))}</b></span>
          <span>swap <b>${fmt((s.open_swap||0)+(s.closed_swap||0))}</b></span>
          <span>commission <b>${fmt(s.closed_commission)}</b></span>
        </div>
      </div>`;
    }).join('');

  seedHistory(a.account_id);

  return `
  <div class="acc-card ${online ? '' : 'offline'}">
    <div class="acc-top">
      <div>
        <div class="acc-name">${a.label || a.account_id}</div>
        <div class="acc-meta">
          <span class="badge">${a.platform||'-'}</span>
          <span>${a.broker||''}${a.account_id ? ' · #'+a.account_id : ''}</span>
          ${!online ? '<span class="badge stale">STALE</span>' : ''}
        </div>
      </div>
      <div class="acc-pnl ${pnlClass}">${pnl>=0?'+':''}${fmt(pnl)}<span class="ccy">${a.currency||''}</span></div>
    </div>
    <div class="sparkline-wrap">${sparklineSvg(hist)}</div>
    <div class="metrics">
      <div class="metric"><div class="label">Balance</div><div class="val">${fmt(a.balance)}</div></div>
      <div class="metric"><div class="label">Equity</div><div class="val">${fmt(a.equity)}</div></div>
      <div class="metric"><div class="label">Margin Lvl</div><div class="val">${fmt(a.margin_level,1)}%</div></div>
    </div>
    <div class="metrics secondary">
      <div class="metric"><div class="label">Leverage</div><div class="val">1:${fmt(a.leverage,0)}</div></div>
      <div class="metric"><div class="label">Free Margin</div><div class="val">${fmt(a.margin_free)}</div></div>
      <div class="metric"><div class="label">Margin Used</div><div class="val">${fmt(a.margin_used_pct,1)}%</div></div>
      <div class="metric"><div class="label">Day P&amp;L</div><div class="val ${dayPnl>0?'pos':(dayPnl<0?'neg':'')}">${dayPnl>=0?'+':''}${fmt(dayPnl)}</div></div>
      <div class="metric"><div class="label">Drawdown</div><div class="val ${dd>0.01?'neg':''}">${fmt(dd,1)}%</div></div>
    </div>
    ${baskets ? `<div class="baskets"><div class="baskets-title">Per-symbol breakdown</div>${baskets}</div>` : ''}
    ${positions ? `<div class="positions">${positions}</div>` : ''}
  </div>`;
}

setInterval(render, 1000);

// ---- daily digest panel ----
async function loadDigest(){
  const day = todayStr();
  document.getElementById('digest-date-label').textContent = `DIGEST — ${day}`;
  document.getElementById('digest-csv-link').href = `/api/export.csv?day=${day}`;
  const body = document.getElementById('digest-body');
  try{
    const res = await fetch(`/api/digest?day=${day}`);
    if(!res.ok){ body.innerHTML = '<div class="digest-empty">Could not load digest.</div>'; return; }
    const data = await res.json();
    const symTotals = {};
    (data.accounts||[]).forEach(acc => {
      (acc.symbols||[]).forEach(s => {
        if(!symbolPasses(s.symbol)) return;
        if(!symTotals[s.symbol]) symTotals[s.symbol] = {live:0, closed:0};
        symTotals[s.symbol].live += (s.open_profit||0)+(s.open_swap||0);
        symTotals[s.symbol].closed += (s.closed_profit||0)+(s.closed_swap||0)+(s.closed_commission||0);
      });
    });
    const syms = Object.keys(symTotals).sort();
    if(syms.length === 0){
      body.innerHTML = '<div class="digest-empty">No symbol activity recorded yet today.</div>';
      return;
    }
    body.innerHTML = syms.map(s => {
      const t = symTotals[s];
      const liveClass = t.live>=0?'pos':'neg', closedClass = t.closed>=0?'pos':'neg';
      return `<div class="digest-row">
        <span class="sym">${s}</span>
        <span class="figs">
          <span>live <b class="${liveClass}">${fmt(t.live)}</b></span>
          <span>closed <b class="${closedClass}">${fmt(t.closed)}</b></span>
        </span>
      </div>`;
    }).join('');
  }catch(e){
    body.innerHTML = '<div class="digest-empty">Could not load digest.</div>';
  }
}

document.getElementById('btn-digest').onclick = () => {
  digestOpen = !digestOpen;
  document.getElementById('btn-digest').classList.toggle('active', digestOpen);
  document.getElementById('digest-panel').classList.toggle('open', digestOpen);
  if(digestOpen) loadDigest();
};
document.getElementById('btn-csv').onclick = () => {
  window.location = `/api/export.csv?day=${todayStr()}`;
};

// ---- websocket ----
function connect(){
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(`${proto}//${location.host}/ws`);

  ws.onopen = () => { dot.classList.add('live'); connText.textContent = 'LIVE FEED'; };
  ws.onclose = (evt) => {
    dot.classList.remove('live');
    if(evt.code === 4401){ window.location = '/login'; return; }
    connText.textContent = 'DISCONNECTED — RETRYING';
    setTimeout(connect, 2000);
  };
  ws.onerror = () => ws.close();
  ws.onmessage = (evt) => {
    const msg = JSON.parse(evt.data);
    if(msg.type === 'full_state'){
      accounts = msg.accounts || {};
      Object.values(accounts).forEach(recordHistory);
    } else if(msg.type === 'update'){
      accounts[msg.account.account_id] = msg.account;
      recordHistory(msg.account);
    }
    render();
  };
}

connect();
render();
</script>
